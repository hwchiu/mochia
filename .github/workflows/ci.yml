name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Lint ─────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff==0.4.4

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

  # ─── Type check ───────────────────────────────────────────────
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install mypy==1.10.0 types-aiofiles

      - name: Run mypy
        run: mypy app/ --ignore-missing-imports --no-error-summary

  # ─── Security ─────────────────────────────────────────────────
  security:
    name: Security scan (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit[toml]==1.7.8

      - name: Run bandit
        run: bandit -r app/ worker.py -c pyproject.toml

  # ─── Tests ────────────────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest-cov==5.0.0

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=60

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  docker-integration:
    name: Docker integration test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      # Build for the host platform only (amd64) — multi-arch is tested in publish.
      # docker buildx --load is incompatible with multi-platform builds.
      - name: Build Docker test image (Python ${{ matrix.python-version }})
        run: |
          docker build \
            --build-arg PYTHON_VERSION=${{ matrix.python-version }} \
            -f Dockerfile.test \
            -t mochia-test:${{ matrix.python-version }} \
            .
      
      - name: Run tests in Docker (Python ${{ matrix.python-version }})
        run: |
          docker run --rm \
            -e AZURE_OPENAI_API_KEY=dummy-key-for-testing \
            -e AZURE_OPENAI_ENDPOINT=https://dummy.openai.azure.com/ \
            -e AZURE_OPENAI_DEPLOYMENT=gpt-35-turbo \
            mochia-test:${{ matrix.python-version }}

  # ─── E2E Smoke Test ───────────────────────────────────────────
  smoke-test:
    name: E2E Smoke Test (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # QEMU + Buildx required for multi-arch builds
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production Docker image (amd64 for smoke test)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --build-arg GIT_SHA=${{ github.sha }} \
            --build-arg BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ") \
            -t mochia:smoke \
            --load \
            .

      - name: Start web container
        run: |
          docker run -d \
            --name mochia-smoke \
            -p 8000:8000 \
            -e AZURE_OPENAI_API_KEY=dummy-key-for-testing \
            -e AZURE_OPENAI_ENDPOINT=https://dummy.openai.azure.com/ \
            -e AZURE_OPENAI_DEPLOYMENT=gpt-35-turbo \
            mochia:smoke

      - name: Run smoke tests
        run: |
          chmod +x smoke-test.sh
          BASE_URL=http://localhost:8000 bash smoke-test.sh

      - name: Show container logs on failure
        if: failure()
        run: docker logs mochia-smoke

      - name: Stop container
        if: always()
        run: docker rm -f mochia-smoke 2>/dev/null || true

  # ─── Publish multi-arch image to Docker Hub ───────────────────
  publish:
    name: Publish multi-arch image to Docker Hub
    runs-on: ubuntu-latest
    # 只在 merge 到 main 後才推送 image（PR 不推）
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, typecheck, security, test, docker-integration, smoke-test]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
      # QEMU enables cross-compilation of arm64 on amd64 CI runner
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USER }}/mochia
          tags: |
            # latest tag on every main push
            type=raw,value=latest
            # git short SHA tag (e.g. sha-a1b2c3d)
            type=sha,prefix=sha-,format=short

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          # Build for both Intel/AMD (x86_64) and Apple Silicon / ARM servers
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
