<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Video Analyzer - 影片分析系統</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/">🎬 Video Analyzer</a>
  <span class="navbar-spacer"></span>
  <button class="btn btn-ghost btn-sm" id="btn-scan">📁 掃描目錄</button>
</nav>

<div class="container">

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value" id="stat-total">—</div>
      <div class="stat-label">總計</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:var(--muted)" id="stat-pending">—</div>
      <div class="stat-label">待處理</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:var(--info)" id="stat-queued">—</div>
      <div class="stat-label">佇列中</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:var(--warning)" id="stat-processing">—</div>
      <div class="stat-label">分析中</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:var(--success)" id="stat-completed">—</div>
      <div class="stat-label">完成</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:var(--danger)" id="stat-failed">—</div>
      <div class="stat-label">失敗</div>
    </div>
  </div>

  <!-- Progress -->
  <div class="card" style="margin-bottom:20px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-size:13px;color:var(--muted)" id="queue-info">載入中...</span>
      <span style="font-size:13px;font-weight:600" id="progress-pct">0%</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>
  </div>

  <!-- Actions -->
  <div class="card" style="margin-bottom:20px">
    <div class="form-row">
      <button class="btn btn-primary" id="btn-queue-all">🚀 全部加入佇列</button>
      <button class="btn btn-ghost" id="btn-queue-selected">📋 加入已選</button>
      <button class="btn btn-ghost" id="btn-retry-failed">🔄 重試失敗</button>
      <button class="btn btn-ghost" id="btn-cancel-queue" style="margin-left:auto;color:var(--danger)">⏹ 取消佇列</button>
    </div>
  </div>

  <!-- Filter & Table -->
  <div class="card">
    <div class="form-row" style="margin-bottom:14px">
      <select id="filter-status">
        <option value="">所有狀態</option>
        <option value="pending">待處理</option>
        <option value="queued">佇列中</option>
        <option value="processing">分析中</option>
        <option value="completed">完成</option>
        <option value="failed">失敗</option>
      </select>
      <select id="filter-source">
        <option value="">所有來源</option>
        <option value="local_scan">本地掃描</option>
        <option value="uploaded">手動上傳</option>
      </select>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th><input type="checkbox" id="select-all"></th>
            <th>檔名</th>
            <th>狀態</th>
            <th>大小</th>
            <th>時長</th>
            <th>來源</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="video-tbody"></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>

</div>

<!-- Scan Modal -->
<div class="overlay hidden" id="scan-overlay">
  <div class="modal">
    <h3>📁 掃描本地目錄</h3>
    <p style="color:var(--muted);font-size:13px;margin-bottom:16px">
      輸入本機目錄路徑，系統會遞迴掃描所有支援的影片格式並登錄至資料庫（不複製檔案）。
    </p>
    <div class="form-col">
      <input type="text" id="scan-path" placeholder="/Volumes/MyDisk/Videos 或 /Users/me/Movies">
    </div>
    <div class="actions">
      <button class="btn btn-ghost" id="scan-cancel">取消</button>
      <button class="btn btn-primary" id="scan-confirm">開始掃描</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="/static/js/common.js"></script>
<script src="/static/js/index.js"></script>
</body>
</html>
